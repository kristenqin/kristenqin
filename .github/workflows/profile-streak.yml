name: Keep Profile Streak

on:
  schedule:
    - cron: "5 14 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: profile-streak
  cancel-in-progress: false

jobs:
  keep-streak:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai
      COMMIT_NAME: ${{ github.repository_owner }}
      COMMIT_EMAIL: ${{ github.actor_id }}+${{ github.repository_owner }}@users.noreply.github.com

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate PAT secret
        env:
          PROFILE_STREAK_PAT: ${{ secrets.PROFILE_STREAK_PAT }}
        run: |
          if [ -z "${PROFILE_STREAK_PAT}" ]; then
            echo "Missing repository secret PROFILE_STREAK_PAT." >&2
            echo "Add a fine-grained PAT with Contents: Read and write for this repository." >&2
            exit 1
          fi

      - name: Update activity marker
        run: |
          target_date="$(date +%F)"
          run_timestamp="$(date '+%Y-%m-%d %H:%M:%S %z')"

          cat > .profile-activity.log <<EOF
          last_run_date=${target_date}
          last_run_timestamp=${run_timestamp}
          source=github-actions
          workflow_run=${GITHUB_RUN_ID}
          EOF

      - name: Commit change if needed
        run: |
          git config user.name "${COMMIT_NAME}"
          git config user.email "${COMMIT_EMAIL}"
          git add .profile-activity.log

          if git diff --cached --quiet; then
            echo "No changes detected."
            exit 0
          fi

          git commit -m "chore: keep profile activity current"

      - name: Rebase and push
        env:
          PROFILE_STREAK_PAT: ${{ secrets.PROFILE_STREAK_PAT }}
        run: |
          git remote set-url origin "https://x-access-token:${PROFILE_STREAK_PAT}@github.com/${GITHUB_REPOSITORY}.git"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"
